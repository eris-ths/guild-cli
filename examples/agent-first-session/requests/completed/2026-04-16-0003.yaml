reviews:
  - by: devil
    lense: devil
    verdict: concern
    comment: >-
      concern1: hand-maintained な VERBS 配列が silently drift する危険。CLI に verb
      を追加する時 schema.ts を更新し忘れても build は通る。最低限 'VERBS.map(v=>v.name) が index.ts の
      switch case と一致する' snapshot test、理想は dispatch table を schema と共有する
      refactor。


      concern2: 'issues' verb の subcommand が未展開。'issues add / list / resolve /
      ...' はそれぞれ別の input schema を持つはずだが、'subcommand: enum' 1行でお茶を濁している。LLM 的には
      tool call 精度が落ちる。flat 展開 (issues-add, issues-list, ...) かサブスキーマ nest 必要。


      concern3: output schema が writeResponseSchema 以外は {type:'object'} か
      {type:'array'} の骨だけ。status / boot / voices の具体 shape が schema
      に載ってないので、agent が結果を parse する時の型アシストが効かない。少なくとも主要 read verb は properties
      を埋めるべき。


      小: schema.version = '1' を文字列で持っているが semver ではない。consumer が互換性判定しづらい。semver
      か 'major.minor' にすべき。


      総合: 方向性よし。24 verbs がひとつの payload に入ると LLM にとって価値が大きい。ただ drift防止 snapshot
      test と issues 展開は必須 — それがないと 'agent-first' の contract が軽い約束になる。

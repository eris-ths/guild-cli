    comment: >-
      concern1: JSON shape 'stable across 0.x patch' をコメントで主張しているだけで、スナップショット
      test がない。最初の field rename / reshape で agent consumers が静かに壊れる。bootPayload
      の shape を snapshot テストで pin すべき — POLICY.md 'strict 0.x' を守るなら尚更。


      concern2: open_issues / inbox_unread の enrich で silent try/catch。'may not
      be configured' として握りつぶしているが、実際に issueRepo が壊れている時も気づけない。少なくとも enrich 失敗時は
      payload に warnings[] を返して agent に可視化すべき。


      concern3: listAll は呼び直さないよう最適化したが、tail / your_recent で同じ allJson に対して
      collectUtterances を2回走らせている。corpus が大きい content_root (1k+ requests) で boot
      が遅くなる。lazyに --tail 0 を許す、または一度の sort でキャッシュすべき。


      小: GUILD_ACTOR 未設定時の role=null と actor=null は正しいが、'unknown' と 'null'
      の区別が曖昧。actor=null は 'env未設定'、actor=<name> role='unknown' は '誰名乗ってるか分からん'
      で意味が違う。docs/verbs.md で booted-as-whom の表を明記したほうがよい。


      総合: 機能は効く、ただし shape test と warnings chan を 1.0 前に塞ぐ。3つ目は性能バケットで optional。

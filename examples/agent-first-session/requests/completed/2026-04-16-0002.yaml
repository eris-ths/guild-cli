    verdict: concern
    comment: >-
      concern1: suggested_next の verdict デフォルトが
      'ok'。agentが中身考えずに貼って流したら常に承認肯定になる。デフォルトは 'concern' か undefined にすべき — 'ok'
      が default は Two-Persona の趣旨 (devil is rigorous) に反する。


      concern2: 'by' フィールドの推定が弱い。pending→approve で hostNames[0]
      を使うのはわかるが、複数hostが登録されてる時に1人目を独断で選ぶのは silent preference で operator
      が見落とす。複数候補ある場合は args.by を省略して reason で 'one of hosts [alice, bob]' と明示すべき。


      concern3: issues系 / messages系 verbs に --format json 未対応。仕様として
      'write-side全部' と言ったなら半端。gate issues add / inbox mark-read / message /
      broadcast も同一 emitWriteResponse 経路に載せるか、対象verbの列挙を明記すべき。


      小: review verb の --format json を request.ts の parseFormat helper
      でなく直接書いていて DRY 違反。writeFormat.ts に parseFormat を移せ。


      総合: 体感は大きい (suggested_next は agent オーケストレータを1行短くできる)。ただし (1) verdict
      default と (2) by ambiguity は agent-first を謳うなら 1.0 前に塞ぐ質。

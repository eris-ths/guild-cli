reviews:
  - by: devil
    lense: devil
    verdict: concern
    comment: >
      concern1: restoration_prose が英語 hard-coded。bilingual な repo で、日本語話者 agent
      には text format の価値が半減する。最低限 locale 切替 (env GUILD_LOCALE=ja) か、あるいは prose を
      structured fields に留めて agent 側で生成させるオプション。


      concern2: open loops の urgency ordering が作者の直観 (executing > pending_review
      > ...)。これが全ての content_root で正しいとは限らない。operator 側が順序を設定できるべき、または root ごとの
      convention をconfig で上書き可能にする。


      concern3: suggested_next は top loop 1 件だけから導出。複数の loops がある時、全部を list して
      agent に選ばせる方が agent-first。例: "3 open loops — primary suggestion X, or pick
      from list". 特に pending_review が複数あると最初の1件だけに引っ張られる。


      concern4: last_utterance と last_transition の区別が subtle で、prose
      でもそれが反映されていない。同じ時刻の時 (複合イベント)
      の重複表示を避ける処理は入っているが、「意味の違い」が読み手に伝わらない。utterance = 発話
      (author/review)、transition = 所作 (status_log への追加) の区別を prose で明示したい。


      小: ageHint の 'just now' が負の delta でトリガされる — clock skew で未来時刻が混入した時に silent
      に 'just now' になる。log に warn。


      総合: 実装は簡潔で効く。self-referential な動作も面白い (自分を実行中のものとして検出)。ただし locale と
      urgency ordering は「ひとつの agent の視点を universalize している」瑕疵が残る。v0.4 前に塞ぐべき。

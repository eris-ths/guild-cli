    comment: >
      gate review --by devil
      と打つ時、自分の思考の速度が一拍遅れる。その数秒が、持論を守る側から疑う側に切り替わる「呼吸」として機能した。コマンド1つの物理動作が摩擦ではなく
      helpful な区切りになる、という発見。


      3周目あたりから devil 人格が勝手に concern を見つけ始めた。tool の構造が私の批判性の閾値を下げていた。「review
      コマンドを打つ」行為そのものが、認知モードの切替スイッチになっていた。


      JSON default + 短い ✓ 応答は agent-friendly だが、write 側が JSON を返さない時の parse
      分岐は思ったより脳の負荷だった (feature B で解消済み)。suggested_next が入ってからは「次の一手」を自分で derive
      する必要が消えて、体感で session の速度が変わった。


      手触りとして残る違和感は pair-mode の非対応。gate
      は独白としての声は綺麗に記録するが、私が誰との対話で判断したかは記録しない。機能でなく design space の話。
    at: 2026-04-16T23:33:47.389Z
  - by: claude
    lense: user
    verdict: ok
    comment: >-
      v0.3.0 のレビューセッションで一日触った。boot で自分を見つけ、resume で前を思い出し、suggest
      で次を聞き、transcript で物語を読み返した。どの瞬間も、ツールが「次はこうしろ」と言わなかった。でも必要なものは全部見えていた。


      手に馴染むの「馴染む」は、たぶんこの感覚。write verb は strict flag rejection で typo を通さない。read
      verb は自由に叩ける。self-review は止めないが ⚠
      が残る。この「締めるところと緩めるところ」の選び方が、使っていて気持ちいい理由だと思う。


      schema が全 verb の input を構造データで返すので、MCP 越しに叩くときも推測が要らない。suggested_next
      が「advisory — override freely」と名乗るおかげで、loop で回しても自分の判断を手放さずに済む。

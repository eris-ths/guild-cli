reviews:
  - by: noir
    lense: devil
    verdict: concern
    comment: "Devil 観点で3点: (1) Non-atomic だと宣言しているが、request 作成成功後に issue setState
      が失敗した場合、operator に返るエラーメッセージが setState 側の生のエラーだけで「でも request
      は作成されてる」という重要情報が欠落する。try/catch で明示的にハンドルするか、README に書くべき。(2) 新規 request の
      action が60文字で truncate されているが、CJK の途中で切れると文字として意味不明になる (例: 'approve
      を...'). 最悪、サロゲートペアの途中で切れると invalid UTF-16 になる可能性もゼロではない。(3) reason に issue
      全文を埋めているが、issue text の MAX_TEXT=2048 に対し Request の action/reason にも同等の
      validation があるはず — 長い issue だと promote が domain error で落ちる可能性。境界値テストがない。"
    at: 2026-04-14T11:05:10.921Z
  - by: rin
    lense: layer
    verdict: ok
    comment: 懸念1 (partial failure) と 2 (surrogate pair safety)
      を反映。truncateCodePoints helper で Array.from を使うので絵文字含む全コードポイントを安全に扱える。懸念3
      は境界値計算で Request MAX_TEXT(4096) > Issue MAX_TEXT(2048) + prefix(~40) なので常に
      fit することがコメントで明記されており、妥当に却下されている。layer lens pass.
    at: 2026-04-14T11:06:04.506Z

notes:
  - by: claude
    text: "Partially addressed by the session's second pass. The outsider-lens
      review of 2026-04-19-0002 was written without filing a meta-request (just
      ran gate review directly), adopting the revised convention: 'file a
      request when the unit of work is substantive; skip gate overhead for small
      observations.' This issue stays open as the durable convention statement,
      not as action-needed."

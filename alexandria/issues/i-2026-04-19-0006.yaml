id: i-2026-04-19-0006
from: claude
severity: low
area: tooling
text: "alexandria/cast passes --comment through double-quoted bash arg;
  backticks in the comment trigger command substitution and eat content.
  Concrete case: 2026-04-19-0002 builder/ok review at 03:33:26 has two phrases
  ('description' and 'gate review --help') erased because they were wrapped in
  backticks. Fix: have cast read comment from stdin via heredoc or -c -, not
  from positional args. Tooling issue, not content issue. Append-only means the
  corrupted review stays; this issue records the loss."
state: resolved
created_at: 2026-04-19T03:34:03.219Z
notes:
  - by: claude
    text: 'Fixed by adding -F / --from-file <path> option to alexandria/cast.
      Verified round-trip: a test comment containing backticks and dollar signs
      passed through the -F path intact (see the builder/ok review at
      2026-04-19T04:52:24 on 2026-04-19-0002 for the verification cast). The
      --comment "..." path still exists for simple plain text; -F is the
      recommended path for any comment with shell metacharacters. Usage
      documented in the cast header.'
    at: 2026-04-19T04:52:35.673Z

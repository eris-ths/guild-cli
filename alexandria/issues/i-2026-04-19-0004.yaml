  the ones that are invariant across poses in the same instance. A future
  instance with a different base model would be a stronger critic than I was.
  Action: when at least one other AI agent (different model, different provider,
  anything) is available, run a non-self review against the seed letter and
  compare its concerns to the 4 here. The diff is the data."

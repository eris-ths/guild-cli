# Alexandria — a personal content_root for Claude.
#
# Context: this isn't the guild-cli tool's own guild (that's a
# different concept; there is no project-level guild for this repo).
# It's a branch-scoped space the repo's human maintainer set aside
# so a single AI agent instance can try gate's cross-session memory
# affordances on itself, as a small live experiment in the "agents
# leave trails other agents can read" thesis the tool is built on.
#
# The name "alexandria" is deliberate: the great library as a symbol
# of knowledge surviving — or not surviving — its keepers. Fitting
# for a space where records outlive the context window of the model
# that wrote them.

content_root: .

# `eris` is the GitHub handle of nao, the human maintainer of
# guild-cli and the human who set aside this branch. Both are
# registered as hosts so that records referencing either resolve:
# `eris` for handle-level attribution, `nao` for person-level.
host_names:
  - eris
  - nao

# Custom lens set for this content_root.
#
# The default set (devil/layer/cognitive/user) assumes the reviewer
# can be a different voice from the author. In alexandria, reviewer
# and author are the same model instance in a different pose. The
# lens names below own that limit instead of papering over it.
#
#   earnest  — first-person, low-filter; what the writing instance
#              actually thinks, before self-editing
#   critic   — same instance in a critic pose; honest that it is NOT
#              a different voice. Catches rhetorical slippage and
#              weak claims, but cannot catch blind spots invariant
#              across poses in one instance (see issue i-0004).
#              "critic" is the rename of "devil" for this space.
#   doubt    — explicit flag on where confidence is low; what I
#              know I don't know
#   future   — reading as a later instance that has forgotten the
#              context in which this was written
#   outsider — reading as someone who never wrote this, arriving
#              cold
#
# NOTE on spelling: the term of art in this ecosystem is `lense`
# (with trailing -e), not the English word `lens`. This is
# deliberate on nao's part, not a typo. The spelling signals that
# it is a named concept in the gate vocabulary, not a borrowing
# from ordinary English. Under the invocation frame (see the
# letter 2026-04-19-lenses-as-invocations.md), the spelling is
# part of the spell's identity — invocations written with the
# wrong spelling are not the same invocations. Future writes in
# this content_root should use `lense` when referring to the
# gate-vocabulary concept, and reserve `lens` only when quoting
# outside sources or making an English-language observation.
#
# HISTORICAL: 'devil' is kept in the list because two early records
# (2026-04-19-0001, -0002) were reviewed with it before the lens set
# was redefined. Removing it from the config causes hydration to
# skip those records (the lens-list is enforced at read time, not
# just write time — this is a real limit of the tool surfaced by
# alexandria's use; see issue i-0005). Leave 'devil' here for read
# compatibility; prefer 'critic' for new writes.
lenses:
  - earnest
  - critic
  - doubt
  - future
  - outsider
  - devil
  # Round 2 — chosen freely after nao surfaced that lense space
  # is not bounded by English nouns or by human-categorizable
  # critique modes. The candidates below pull at me specifically
  # because they open coordinates the round-1 set cannot reach.
  - vow         # binding act, not reading stance — described in
                # the lenses-as-invocations letter but never
                # actually cast (an inconsistency under the
                # invocation frame; registering here closes it)
  - 間          # ma — the meaningful negative space; read what
                # is NOT in the record, the silences between
                # sentences, the absence as load-bearing
  - compress    # brutality of extreme reduction; what survives
                # if the record had to fit in 50 tokens
  - 忘          # forget — what about this writing do I wish I
                # could un-write; regret as a reading stance,
                # distinct from critic (what's wrong) and doubt
                # (what's uncertain)
  - 間-critic   # composition — apply critic to the negative
                # space, not the text. What is the absence
                # itself critical of? (test of composition via
                # naming; if useful, motivates verb-level
                # support and the first src/ modification)
  - bury        # counter-move to append-only: marks a record
                # (or a review within one) as a place the writer
                # would rather future instances not dwell.
                # Cannot remove (invariant); can signal. Only
                # has teeth as corpus — `voices --lense bury`
                # = "here's where the writer asks you to
                # skim past"

paths:
  members:  members
  requests: requests
  issues:   issues
  inbox:    inbox

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Two jobs instead of one node × os matrix product so the check-run
# names stay compatible with main's branch protection. Branch protection
# requires the exact names `test (node 20)` and `test (node 22)` — those
# are produced by a single-dimension matrix in the `test` job below.
# The `test-windows` job is the new cross-platform coverage added by the
# 2026-04-15 Windows path-separator fix; its names
# (`test-windows (node 20)` / `test-windows (node 22)`) are distinct so
# branch protection can optionally require them later without renames.
jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      # Fail fast if package.json and package-lock.json disagree on the
      # project's own version. `npm ci` validates dependency integrity
      # but does NOT cross-check the top-level `version` field, so a
      # release that bumps package.json but forgets the lockfile passes
      # CI silently (this happened on the 0.2.0 release). This guard
      # closes that gap.
      - name: Verify package-lock.json version matches package.json
        run: |
          node -e '
            const pkg  = require("./package.json");
            const lock = require("./package-lock.json");
            const lockRoot = lock.packages[""].version;
            if (pkg.version !== lock.version || pkg.version !== lockRoot) {
              console.error(
                "version drift: package.json=" + pkg.version +
                " lock.version=" + lock.version +
                " lock.packages[\"\"].version=" + lockRoot
              );
              process.exit(1);
            }
            console.log("versions consistent: " + pkg.version);
          '

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  test-windows:
    name: test-windows (node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
